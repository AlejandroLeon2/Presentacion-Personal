<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio de Pedro Alejandro</title>
    <link rel="stylesheet" href="../css/pedro.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/iconify/2.0.0/iconify.min.js"></script>
  </head>
  <body>
    <header id="header"></header>
    <main class="main">
      <!-- Hero -->
      <section class="hero">
        <figure class="hero__image-container">
          <img
            src="/assets/images/gato-5.svg"
            class="hero__image"
            alt="Pedro Alejandro"
          />

          <div class="hero__circle hero__circle--1">
            <!-- Astro -->
            <span
              class="iconify icons"
              data-icon="logos:astro-icon"
              data-width="48"
            ></span>
          </div>
          <div class="hero__circle hero__circle--2">
            <span
              class="iconify icons"
              data-icon="logos:angular-icon"
              data-width="48"
            ></span>
          </div>
          <div class="hero__circle hero__circle--3">
            <!-- Google Apps Script -->
            <span
              class="iconify icons"
              data-icon="logos:css"
              data-width="48"
            ></span>
          </div>
          <div class="hero__circle hero__circle--4">
            <!-- C++ -->
            <span
              class="iconify icons"
              data-icon="logos:c-plusplus"
              data-width="48"
            ></span>
          </div>
        </figure>
        <div class="hero__content">
          <h1 class="hero__title">Pedro Alejandro</h1>
          <p class="hero__subtitle">Desarrollador Frontend</p>
        </div>
      </section>

      <!-- Hobbies -->
      <section class="section section--hobbies">
        <div class="section__header">
          <h2 class="section__title">Hobbies</h2>
          <img
            src="/assets/images/gato-1.svg"
            alt="Icono gato"
            class="section__icon section__icon--hobbies"
          />
        </div>
        <ul id="hobbies-list" class="cards-list cards-list--hobbies">
          <!-- Angular -->
        </ul>
      </section>

      <!-- Proyectos -->
      <section class="section section--projects">
        <div class="section__header">
          <h2 class="section__title">Proyectos</h2>
          <img
            src="/assets/images/gato-6.svg"
            alt="Icono gato"
            class="section__icon section__icon--projects"
          />
        </div>
        <ul id="projects-list" class="cards-list cards-list--projects"></ul>
      </section>

      <!-- Contacto -->
      <section class="section section--contact">
        <div class="section__header">
          <h2 class="section__title">Contacto</h2>
        </div>
        <div class="contact" aria-labelledby="contact-heading">
          <div class="contact__form-card">
            <form
              id="contact-form"
              action="https://docs.google.com/forms/d/e/1FAIpQLSdM8DFJbxcJuK9J7kMnteJjUdgcJDwAgpRvsQ5hSDxQKkkpNA/formResponse"
              method="POST"
              class="contact__form"
            >
              <fieldset class="contact__fieldset">
                <legend class="contact__legend">Formulario de contacto</legend>

                <div class="contact__field">
                  <label for="entry.1976024743" class="contact__label"
                    >Nombre</label
                  >
                  <input
                    type="text"
                    id="entry.1976024743"
                    name="entry.1976024743"
                    class="contact__input"
                    placeholder="Tu nombre completo"
                  />
                </div>

                <div class="contact__field">
                  <label for="entry.51458991" class="contact__label"
                    >Email</label
                  >
                  <input
                    type="email"
                    id="entry.51458991"
                    name="entry.51458991"
                    class="contact__input"
                    placeholder="tu@email.com"
                  />
                </div>

                <div class="contact__field">
                  <label for="entry.1046613419" class="contact__label"
                    >Mensaje</label
                  >
                  <textarea
                    id="entry.1046613419"
                    name="entry.1046613419"
                    class="contact__textarea"
                    placeholder="Escribe tu mensaje aquí..."
                  ></textarea>
                </div>

                <button type="submit" class="contact__button">
                  Enviar mensaje
                </button>
              </fieldset>
            </form>
          </div>

          <address class="contact__info">
            <img
              src="/assets/images/gato-3.svg"
              alt="imagen de gato"
              class="contact__info-icon"
            />
            <h2 class="contact__info-title">Información de contacto</h2>
            <ul class="contact__info-list">
              <li class="contact__info-item">
                <span class="contact__info-label">Email</span>
                <a
                  href="mailto:alejandroleonpedro7@gmail.com"
                  class="contact__link"
                  >alejandroleonpedro7@gmail.com</a
                >
              </li>
              <li class="contact__info-item">
                <span class="contact__info-label">Teléfono</span>
                <a href="tel:+51924932128" class="contact__link"
                  >+51 924932128</a
                >
              </li>
              <li class="contact__info-item">
                <span class="contact__info-label">Dirección</span>
                <span class="contact__info-value">Calle las palmeras</span>
              </li>
            </ul>
          </address>
        </div>
      </section>
    </main>
    <footer id="footer"></footer>


    <script src="/src/js/script.js"></script>
  </body>
</html>
